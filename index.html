<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lindhe 7th Ed. Study Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg:#f5f5f3;--sur:#fff;--sur2:#f0efeb;--bdr:rgba(0,0,0,.10);--bdrs:rgba(0,0,0,.18);
  --tx:#1a1a18;--tx2:#5a5a57;--txm:#8a8a86;
  --ac:#1a6fcc;--acb:#e6f1fb;--acbd:#85b7eb;
  --ok:#2d7a3a;--okb:#eaf3de;--okf:#639922;
  --wn:#854f0b;--wnb:#faeeda;--wnf:#ba7517;--wnbd:#ef9f27;
  --dg:#a32d2d;--dgb:#fcebeb;--rad:8px;--star:#E9A800;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}

/* LOCK */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;}
.lcard{background:var(--sur);border-radius:16px;border:.5px solid var(--bdrs);padding:2.5rem 2rem;width:340px;text-align:center;}
.lcard h2{font-size:18px;font-weight:500;margin-bottom:6px;}
.lcard p{font-size:13px;color:var(--tx2);margin-bottom:1.5rem;}
#pw-inp{width:100%;padding:10px;border-radius:var(--rad);border:.5px solid var(--bdrs);background:var(--sur2);font-size:14px;color:var(--tx);margin-bottom:10px;text-align:center;letter-spacing:2px;}
#pw-inp:focus{outline:none;border-color:var(--ac);}
#pw-btn{width:100%;padding:10px;border-radius:var(--rad);border:none;background:var(--ac);color:#fff;font-size:14px;font-weight:500;cursor:pointer;}
#pw-btn:hover{background:#155ab5;}
#pw-err{font-size:12px;color:var(--dg);margin-top:8px;min-height:18px;}
.lock-icon{font-size:36px;color:var(--ac);margin-bottom:1rem;}

/* APP */
#app{display:none;max-width:980px;margin:0 auto;padding:2rem 1.5rem 4rem;}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;gap:12px;}
.hdr h1{font-size:22px;font-weight:500;margin-bottom:4px;}
.hdr p{font-size:13px;color:var(--tx2);}
.hdr-btns{display:flex;gap:8px;flex-shrink:0;}
.ibtn{font-size:12px;padding:7px 14px;border-radius:var(--rad);border:.5px solid var(--bdrs);background:var(--sur);color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.ibtn:hover{border-color:var(--acbd);color:var(--ac);background:var(--acb);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.5rem;}
.sc{background:var(--sur);border-radius:10px;padding:12px 14px;border:.5px solid var(--bdr);}
.sc-label{font-size:11px;color:var(--txm);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.sc-val{font-size:24px;font-weight:500;}
.green{color:var(--ok);}.amber{color:var(--wn);}.red{color:var(--dg);}.blue{color:var(--ac);}
.pbo{background:var(--sur);border-radius:6px;height:8px;margin-bottom:1.5rem;overflow:hidden;}
.pbi{height:100%;background:var(--ac);border-radius:6px;transition:width .4s;}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.fbtn{font-size:12px;padding:5px 12px;border-radius:var(--rad);border:.5px solid var(--bdrs);background:transparent;color:var(--tx2);cursor:pointer;}
.fbtn.on{background:var(--acb);border-color:var(--acbd);color:var(--ac);}
.fbtn:hover:not(.on){background:var(--sur);}
#srch{font-size:13px;padding:5px 10px;border-radius:var(--rad);border:.5px solid var(--bdrs);background:var(--sur);color:var(--tx);width:200px;margin-left:auto;}
#srch:focus{outline:none;border-color:var(--ac);}

/* LIST */
.vol-hdr{font-size:11px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.06em;padding:10px 0 6px;border-bottom:.5px solid var(--bdr);margin-bottom:8px;}
.part-hdr{font-size:12px;font-weight:500;color:var(--tx2);padding:10px 0 4px;}
.ch-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:3px;border:.5px solid transparent;cursor:pointer;}
.ch-row:hover{background:var(--sur);}
.ch-row.sel{background:var(--sur);border-color:var(--bdrs);}
.ch-row.prio{border-left:2px solid var(--wnf);padding-left:8px;}
.ch-num{font-size:11px;color:var(--txm);min-width:24px;font-weight:600;}
.ch-tit{flex:1;font-size:13px;}
.ch-au{font-size:11px;color:var(--txm);width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.ch-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.sg-pip{width:7px;height:7px;border-radius:50%;background:var(--okf);}
.star-row{display:flex;gap:1px;}
.star-r{font-size:12px;color:#ddd;line-height:1;background:none;border:none;cursor:pointer;padding:0;}
.star-r.on{color:var(--star);}
.flag{font-size:14px;opacity:.25;background:none;border:none;cursor:pointer;padding:0;line-height:1;}
.flag.on{opacity:1;color:var(--wnf);}
.dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--bdrs);cursor:pointer;flex-shrink:0;}
.dot.not-started{background:transparent;}
.dot.in-progress{background:var(--wnf);border-color:var(--wnbd);}
.dot.completed{background:var(--okf);border-color:var(--ok);}

/* DETAIL PANEL */
#detpanel{margin-top:1.5rem;}
.dp-wrap{background:var(--sur);border-radius:12px;padding:1.5rem;border:.5px solid var(--bdrs);}
.dp-wrap h3{font-size:16px;font-weight:500;margin-bottom:4px;}
.dp-sub{font-size:12px;color:var(--tx2);margin-bottom:1rem;}
.tab-bar{display:flex;border-bottom:.5px solid var(--bdrs);margin-bottom:1.25rem;}
.tab-btn{font-size:13px;padding:8px 18px;cursor:pointer;color:var(--tx2);border:none;border-bottom:2px solid transparent;background:transparent;margin-bottom:-1px;}
.tab-btn.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:500;}
.tab-btn:hover:not(.on){color:var(--tx);}
.tab-pane{display:none;}
.tab-pane.on{display:block;}

/* PROGRESS PANE */
.field-label{display:block;font-size:12px;color:var(--txm);margin-bottom:6px;}
.field-sel{display:block;font-size:12px;padding:5px 10px;border-radius:var(--rad);border:.5px solid var(--bdrs);background:var(--sur2);color:var(--tx);margin-bottom:16px;width:auto;}
.star-big{display:flex;gap:4px;margin-bottom:16px;}
.star-b{font-size:22px;color:#ddd;background:none;border:none;cursor:pointer;padding:0;line-height:1;}
.star-b.on{color:var(--star);}
.prio-tog{display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:16px;background:none;border:none;padding:0;text-align:left;}
.prio-tog .pf{font-size:18px;opacity:.3;}
.prio-tog.on .pf{opacity:1;color:var(--wnf);}
.prio-tog .pt{font-size:12px;color:var(--tx2);}
.prio-tog.on .pt{color:var(--wn);}
#dp-notes{display:block;width:100%;font-size:13px;padding:10px 12px;border-radius:var(--rad);border:.5px solid var(--bdrs);background:var(--sur2);color:var(--tx);resize:vertical;min-height:100px;font-family:inherit;line-height:1.6;margin-bottom:16px;}
#dp-notes:focus{outline:none;border-color:var(--ac);}
.file-zone{display:block;border:1.5px dashed var(--bdrs);border-radius:8px;padding:12px;text-align:center;font-size:13px;color:var(--txm);cursor:pointer;margin-top:8px;}
.file-zone:hover{border-color:var(--acbd);color:var(--ac);background:var(--acb);}
.file-inp{display:none;}
.file-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;background:var(--acb);border:.5px solid var(--acbd);color:var(--ac);border-radius:10px;margin:0 6px 6px 0;}
.rm-chip{cursor:pointer;opacity:.6;margin-left:3px;}
.save-btn{font-size:12px;padding:6px 16px;border-radius:var(--rad);border:.5px solid var(--acbd);background:var(--acb);color:var(--ac);cursor:pointer;font-weight:500;}
.save-btn:hover{background:var(--ac);color:#fff;}
.save-ok{font-size:11px;color:var(--ok);margin-left:10px;opacity:0;transition:opacity .3s;}
.save-ok.show{opacity:1;}

/* STUDY GUIDE PANE */
.sg-body{font-size:13px;line-height:1.75;}
.sg-body h2{font-size:16px;font-weight:500;color:var(--ac);margin:1.5rem 0 .5rem;padding-bottom:4px;border-bottom:.5px solid var(--bdr);}
.sg-body h2:first-child{margin-top:0;}
.sg-body h3{font-size:14px;font-weight:500;margin:1rem 0 .3rem;}
.sg-body h4{font-size:13px;font-weight:500;margin:.75rem 0 .2rem;color:var(--tx2);}
.sg-body p{margin-bottom:.6rem;}
.sg-body ul{margin:.3rem 0 .6rem 1.2rem;}
.sg-body li{margin-bottom:.25rem;}
.sg-body table{width:100%;border-collapse:collapse;margin:.5rem 0 1rem;font-size:12px;}
.sg-body th{background:var(--acb);color:var(--ac);padding:6px 10px;text-align:left;font-weight:500;border:.5px solid var(--acbd);}
.sg-body td{padding:6px 10px;border:.5px solid var(--bdrs);vertical-align:top;}
.sg-body tr:nth-child(even) td{background:var(--sur2);}
.pearl{background:var(--acb);border-left:3px solid var(--ac);border-radius:0 6px 6px 0;padding:10px 14px;margin:.5rem 0;font-size:12px;line-height:1.6;}
.tip{background:var(--wnb);border-left:3px solid var(--wnf);border-radius:0 6px 6px 0;padding:10px 14px;margin:.5rem 0;font-size:12px;line-height:1.6;}

/* QUIZ PANE */
.quiz-score{background:var(--acb);border:.5px solid var(--acbd);border-radius:10px;padding:1rem;font-size:14px;color:var(--ac);font-weight:500;text-align:center;margin-bottom:1rem;}
.reset-btn{font-size:12px;padding:5px 14px;border-radius:var(--rad);border:.5px solid var(--bdrs);background:var(--sur2);color:var(--tx2);cursor:pointer;margin-bottom:1rem;}
.q-wrap{display:flex;flex-direction:column;gap:1.5rem;}
.q-card{background:var(--sur2);border-radius:10px;padding:1.25rem;border:.5px solid var(--bdr);}
.q-num{font-size:11px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem;}
.q-txt{font-size:13px;line-height:1.65;margin-bottom:1rem;font-weight:500;}
.q-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:.5rem;}
.q-opt{font-size:13px;padding:9px 14px;border-radius:var(--rad);border:.5px solid var(--bdrs);background:var(--sur);cursor:pointer;text-align:left;line-height:1.5;width:100%;}
.q-opt:hover:not(:disabled){background:var(--acb);border-color:var(--acbd);}
.q-opt:disabled{cursor:default;}
.q-opt.correct{background:#eaf3de;border-color:#639922;color:#1a4a22;}
.q-opt.wrong{background:var(--dgb);border-color:#e24b4a;color:#501313;}
.q-expl{font-size:12px;line-height:1.6;padding:10px 14px;border-radius:var(--rad);background:var(--sur);border:.5px solid var(--bdr);margin-top:4px;}

.empty{text-align:center;padding:2.5rem;color:var(--txm);font-size:13px;}
</style>
</head>
<body>

<div id="lock">
  <div class="lcard">
    <div class="lock-icon"><i class="ti ti-lock"></i></div>
    <h2>Lindhe study tracker</h2>
    <p>Enter the password to continue.</p>
    <input type="password" id="pw-inp" placeholder="Password">
    <button id="pw-btn">Unlock</button>
    <div id="pw-err"></div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div>
      <h1>Lindhe 7th ed. &mdash; study tracker</h1>
      <p>Track progress &middot; study guides &middot; INBDE quizzes &middot; lecture files</p>
    </div>
    <div class="hdr-btns">
      <button class="ibtn" id="exp-btn"><i class="ti ti-download"></i> Export CSV</button>
      <button class="ibtn" id="lock-btn"><i class="ti ti-lock"></i> Lock</button>
    </div>
  </div>

  <div class="stats">
    <div class="sc"><div class="sc-label">Total</div><div class="sc-val" id="s-tot">42</div></div>
    <div class="sc"><div class="sc-label">Completed</div><div class="sc-val green" id="s-don">0</div></div>
    <div class="sc"><div class="sc-label">In progress</div><div class="sc-val amber" id="s-pro">0</div></div>
    <div class="sc"><div class="sc-label">Priority</div><div class="sc-val red" id="s-pri">0</div></div>
    <div class="sc"><div class="sc-label">Lectures</div><div class="sc-val blue" id="s-ppt">0</div></div>
  </div>
  <div class="pbo"><div class="pbi" id="prog-bar" style="width:0%"></div></div>

  <div class="filters">
    <button class="fbtn on" data-f="all">All</button>
    <button class="fbtn" data-f="not-started">Not started</button>
    <button class="fbtn" data-f="in-progress">In progress</button>
    <button class="fbtn" data-f="completed">Completed</button>
    <button class="fbtn" data-f="priority">Priority</button>
    <input type="text" id="srch" placeholder="Search chapters...">
  </div>

  <div id="chlist"></div>
  <div id="detpanel"></div>
</div>

<script>
// ── constants ──────────────────────────────────────────────────────────────
var PW = 'PerioIU';
var STORE_KEY = 'lindhe_v7';

// ── study guide data (plain strings, no template literals) ─────────────────
var SG6_HTML = '<h2>1. Foundational Concepts &amp; Definitions</h2>\n<h3>What is Epidemiology?</h3>\n<ul>\n<li>Study of the <strong>distribution</strong> (who, where, when) and <strong>determinants</strong> (why, how) of health and disease in populations</li>\n<li>Informs prevention strategies, public health policy, and clinical guidelines</li>\n<li>Three core questions: How common is the disease? Who gets it? Why do they get it?</li>\n</ul>\n<h3>Key Epidemiologic Terms</h3>\n<table><tr><th>Term</th><th>Definition</th><th>Example</th></tr>\n<tr><td><strong>Prevalence</strong></td><td>Proportion with disease at a point in time</td><td>47% of US adults have periodontitis</td></tr>\n<tr><td><strong>Incidence</strong></td><td>Rate of new cases over time</td><td>New cases per 1,000 person-years</td></tr>\n<tr><td><strong>Risk factor</strong></td><td>Causally associated exposure preceding disease</td><td>Smoking → periodontitis</td></tr>\n<tr><td><strong>Risk indicator</strong></td><td>Cross-sectional association; causality unconfirmed</td><td>Stress → periodontitis</td></tr>\n<tr><td><strong>Risk marker</strong></td><td>Associated but not modifiable</td><td>Age, race</td></tr>\n<tr><td><strong>Odds ratio (OR)</strong></td><td>Association measure in case-control studies</td><td>OR 3.5 for smokers</td></tr>\n<tr><td><strong>Relative risk (RR)</strong></td><td>Association measure in cohort studies</td><td>RR 2.8 for diabetics</td></tr>\n<tr><td><strong>Confounder</strong></td><td>Variable associated with both exposure and outcome</td><td>SES confounds smoking-perio link</td></tr>\n</table>\n\n<h2>2. Examination Methods &amp; Index Systems</h2>\n<h3>Why Index Systems Matter</h3>\n<ul>\n<li>Standardize measurement across studies and populations</li>\n<li><strong>Full-mouth recording (FMR)</strong> vs. <strong>partial-mouth recording (PMR)</strong> significantly affects estimates — PMR underestimates prevalence by 50% or more</li>\n<li>Most large epidemiologic studies now recommend FMR</li>\n</ul>\n<table><tr><th>Index</th><th>Measures</th><th>Scale/Notes</th></tr>\n<tr><td><strong>GI</strong> (Löe &amp; Silness)</td><td>Gingival inflammation</td><td>0–3; 6 sites/tooth</td></tr>\n<tr><td><strong>PlI</strong> (Silness &amp; Löe)</td><td>Plaque accumulation</td><td>0–3; 4 surfaces/tooth</td></tr>\n<tr><td><strong>GSBI</strong></td><td>Bleeding on probing</td><td>Presence/absence</td></tr>\n<tr><td><strong>PI</strong> (Russell)</td><td>Combined gingival + bone status</td><td>0–8; historical importance</td></tr>\n<tr><td><strong>PDI</strong> (Ramfjord)</td><td>Pocket depth + attachment loss</td><td>6 Ramfjord teeth; partial-mouth</td></tr>\n<tr><td><strong>ESI</strong></td><td>Extent + mean severity</td><td>Two-component; captures spread and depth</td></tr>\n<tr><td><strong>CPITN / CPI</strong></td><td>Treatment needs screening</td><td>Codes 0–4; WHO probe; does NOT measure CAL</td></tr>\n</table>\n<div class="tip"><strong>⚠ Key Limitation:</strong> CPITN does not measure attachment loss and underestimates true disease severity — not suitable for longitudinal research.</div>\n\n<h2>3. Case Definitions</h2>\n<h3>CDC/AAP Case Definition (Page &amp; Eke 2007)</h3>\n<table><tr><th>Severity</th><th>CAL Criterion</th><th>PD Criterion</th></tr>\n<tr><td><strong>Severe</strong></td><td>≥2 interproximal sites CAL ≥6mm (not same tooth)</td><td>AND ≥1 site PD ≥5mm</td></tr>\n<tr><td><strong>Moderate</strong></td><td>≥2 interproximal sites CAL ≥4mm (not same tooth)</td><td>OR ≥2 sites PD ≥5mm</td></tr>\n<tr><td><strong>Mild</strong></td><td>≥2 interproximal sites CAL ≥3mm</td><td>AND ≥2 sites PD ≥4mm or 1 site PD ≥5mm</td></tr>\n</table>\n\n<h3>2017 World Workshop Classification — Current Gold Standard</h3>\n<h4>Staging (Severity &amp; Complexity)</h4>\n<table><tr><th>Stage</th><th>CAL</th><th>Bone Loss</th><th>Tooth Loss</th><th>Complexity</th></tr>\n<tr><td><strong>I</strong></td><td>1–2mm</td><td>&lt;15%</td><td>None</td><td>Max PD ≤4mm</td></tr>\n<tr><td><strong>II</strong></td><td>3–4mm</td><td>15–33%</td><td>None</td><td>Max PD ≤5mm</td></tr>\n<tr><td><strong>III</strong></td><td>≥5mm</td><td>&gt;33%</td><td>≤4 teeth</td><td>PD ≥6mm, furcation II/III</td></tr>\n<tr><td><strong>IV</strong></td><td>≥5mm</td><td>&gt;33%</td><td>≥5 teeth</td><td>Masticatory dysfunction</td></tr>\n</table>\n<h4>Grading (Rate of Progression &amp; Risk)</h4>\n<table><tr><th>Grade</th><th>Progression</th><th>Key Features</th></tr>\n<tr><td><strong>A</strong></td><td>Slow</td><td>No risk factors; % bone loss/age &lt;0.25</td></tr>\n<tr><td><strong>B</strong></td><td>Moderate</td><td>Smoking &lt;10 cigs/day; HbA1c &lt;7%; % bone loss/age 0.25–1.0</td></tr>\n<tr><td><strong>C</strong></td><td>Rapid</td><td>Smoking ≥10 cigs/day; HbA1c ≥7%; % bone loss/age &gt;1.0</td></tr>\n</table>\n<div class="pearl"><strong>📌 Why Stage/Grade replaced Chronic/Aggressive:</strong> The old terminology implied fixed categories. Stage/Grade reflects dynamic disease behavior, integrates rate of progression, and enables individualized prognosis.</div>\n\n<h2>4. Prevalence Data</h2>\n<h3>United States — NHANES (Eke et al. 2015)</h3>\n<ul>\n<li><strong>47.2%</strong> of US adults ≥30 years have periodontitis (any severity)</li>\n<li><strong>8.9%</strong> severe; <strong>30.0%</strong> moderate; <strong>8.5%</strong> mild</li>\n<li>Males: 56.4% vs. Females: 38.4%</li>\n<li>Mexican Americans: 66.7%; African Americans: 58.6%; Non-Hispanic whites: 40.8%</li>\n<li>Below poverty level: 65.4% vs. at/above: 41.8%</li>\n<li>Prevalence rises sharply with age: ~38% at 30–34 yrs → &gt;70% at ≥65 yrs</li>\n</ul>\n<h3>Global Burden (Kassebaum et al. 2014)</h3>\n<ul>\n<li>Severe periodontitis: <strong>~11% of global population</strong> (~743 million people)</li>\n<li><strong>6th most prevalent condition worldwide</strong></li>\n<li>Increased 57.3% between 1990–2010 due to population aging</li>\n</ul>\n<h3>Children &amp; Adolescents</h3>\n<ul>\n<li>True periodontitis uncommon before puberty</li>\n<li>Gingivitis extremely prevalent; peaks at puberty (hormonal modulation)</li>\n<li>Stage III/IV Grade C in teens: strongly familial — check for systemic conditions (Papillon-Lefèvre, neutrophil disorders)</li>\n</ul>\n<h3>Periodontitis &amp; Tooth Loss</h3>\n<ul>\n<li><strong>Leading cause of tooth loss in adults &gt;40 years</strong></li>\n<li>Molar teeth lost disproportionately (furcation involvement)</li>\n<li>Treated: ~0.1–0.3 teeth/year lost; untreated: significantly higher</li>\n</ul>\n<div class="tip"><strong>⚠ Healthy Survivor Bias:</strong> Edentulous patients are excluded from periodontal studies, removing the most severe end of the disease spectrum and systematically underestimating true prevalence.</div>\n\n<h2>5. Causal Inference Frameworks</h2>\n<h3>Bradford Hill Criteria (1965)</h3>\n<table><tr><th>Criterion</th><th>Description</th><th>Notes</th></tr>\n<tr><td><strong>Temporality</strong></td><td>Cause must precede effect</td><td><strong>ONLY absolute requirement</strong></td></tr>\n<tr><td>Strength</td><td>Large OR/RR more likely causal</td><td>Strong but not absolute</td></tr>\n<tr><td>Consistency</td><td>Replicated across populations</td><td>Reduces chance findings</td></tr>\n<tr><td>Biological gradient</td><td>Dose-response relationship</td><td>Pack-years &amp; perio severity</td></tr>\n<tr><td>Plausibility</td><td>Biologically sensible</td><td>Requires existing knowledge</td></tr>\n<tr><td>Experiment</td><td>Removing cause reduces disease</td><td>Treatment trials</td></tr>\n</table>\n<h3>Rothman\'s Sufficient Cause Model</h3>\n<ul>\n<li>Disease requires a <strong>sufficient cause</strong> = complete set of component causes ("pie")</li>\n<li>Explains why not all smokers get periodontitis — other components must complete the "pie"</li>\n<li>Explains synergism: two factors together exceed additive effect</li>\n</ul>\n<h3>Beck\'s 4-Step Framework</h3>\n<ul>\n<li>1. Cross-sectional association demonstrated</li>\n<li>2. Longitudinal studies confirm temporal relationship</li>\n<li>3. Intervention (removing exposure) reduces disease</li>\n<li>4. Biological mechanism identified</li>\n</ul>\n\n<h2>6. Risk Factors</h2>\n<h3>Non-Modifiable Factors</h3>\n<ul>\n<li><strong>Age:</strong> Consistent strong association — reflects cumulative exposure, not true causality</li>\n<li><strong>Sex:</strong> Males consistently higher prevalence; females: hormonal modulation in pregnancy/puberty</li>\n<li><strong>Race/Ethnicity:</strong> AA and Hispanic Americans show higher prevalence; heavily confounded by SES</li>\n<li><strong>Genetics:</strong> Heritability 38–82%; polygenic; GWAS identified immune regulation loci; no single "periodontitis gene"</li>\n</ul>\n<h3>Tobacco Smoking — Strongest Modifiable Risk Factor</h3>\n<ul>\n<li>OR for periodontitis: 2.5–7x vs. non-smokers; dose-dependent (pack-years)</li>\n<li>Mechanisms: vasoconstriction (masks BOP), impaired neutrophil function, altered microbiota, impaired fibroblast healing</li>\n<li>Cessation: risk approaches non-smoker levels after ~11 years</li>\n</ul>\n<div class="pearl"><strong>🔑 Critical Clinical Point:</strong> Smoking suppresses BOP — deep pockets with minimal bleeding in a smoker does NOT mean the disease is inactive. This is one of the most tested clinical pearls in periodontology.</div>\n<h3>Diabetes Mellitus</h3>\n<ul>\n<li><strong>Bidirectional relationship</strong> — periodontitis worsens glycemic control AND DM worsens periodontitis</li>\n<li>Poorly controlled DM (HbA1c &gt;7–8%) → 3x increased risk severe periodontitis</li>\n<li>Mechanisms: AGE accumulation, impaired PMN function, microangiopathy, impaired wound healing</li>\n<li>Periodontal treatment → ~0.4% HbA1c reduction (meta-analyses)</li>\n</ul>\n<h3>Obesity, Osteoporosis, HIV, Stress</h3>\n<ul>\n<li><strong>Obesity:</strong> Adipose tissue produces TNF-α, IL-6, leptin — all pro-inflammatory; abdominal obesity strongest predictor</li>\n<li><strong>Osteoporosis:</strong> Shared RANKL/OPG pathway; evidence mainly in post-menopausal women; bisphosphonates → MRONJ risk</li>\n<li><strong>HIV:</strong> NUP hallmark of advanced disease (CD4 &lt;200); HAART dramatically reduced incidence</li>\n<li><strong>Stress:</strong> Cortisol-mediated immune suppression + behavioral changes; difficult to measure</li>\n</ul>\n<h3>Microbial Factors — Dysbiosis Model</h3>\n<ul>\n<li>Modern view: community-level shift from symbiotic to pathogenic microbiome (NOT single pathogen)</li>\n<li><strong>Keystone pathogens</strong> (e.g., P. gingivalis): low abundance but disproportionate disruption of host immune surveillance</li>\n<li>Red complex (P. gingivalis, T. forsythia, T. denticola): strongly associated with severity</li>\n<li>Dysbiosis model explains individual variation better than specific plaque hypothesis</li>\n</ul>\n\n<h2>7. Key Concepts to Master</h2>\n<ul>\n<li>Difference between risk factor, risk indicator, and risk marker</li>\n<li>Full-mouth vs. partial-mouth recording — why it matters for prevalence estimates</li>\n<li>The 2017 Stage/Grade system — staging criteria and grading modifiers</li>\n<li>Temporality = only absolute Bradford Hill criterion</li>\n<li>Bidirectional DM-periodontitis relationship and its clinical implications</li>\n<li>Why smoking masks BOP — do not reassure a smoker based on absence of bleeding</li>\n<li>Dysbiosis model vs. specific plaque hypothesis</li>\n<li>Healthy survivor bias in epidemiologic studies</li>\n</ul>\n\n<h2>8. Clinical Pearls</h2>\n<div class="pearl">🔑 ~47% of US adults ≥30 have periodontitis; &gt;70% of those ≥65</div>\n<div class="pearl">🔑 Severe periodontitis = 6th most prevalent condition globally (~11% of population)</div>\n<div class="pearl">🔑 Smoking is the strongest modifiable risk factor — OR up to 7x; suppresses BOP</div>\n<div class="pearl">🔑 Periodontal treatment → ~0.4% HbA1c reduction in diabetics — clinically meaningful but does not normalize glycemic control</div>\n<div class="pearl">🔑 Grade C = rapid progression — young patient + smoker + poorly controlled DM = worst prognosis</div>\n<div class="pearl">🔑 Molar teeth lost disproportionately — furcation involvement is a Stage III complexity factor</div>\n<div class="pearl">🔑 Bisphosphonates + perio surgery = MRONJ risk — always take a thorough medication history</div>\n<div class="pearl">🔑 Drug-induced gingival enlargement triad: cyclosporine, nifedipine, phenytoin</div>\n<div class="pearl">🔑 NUP in a young patient → rule out HIV/immunodeficiency before attributing to stress alone</div>\n\n<h2>9. Priority Reading</h2>\n<ul>\n<li>Papapanou &amp; Demmer — Chapter 6, Lindhe 7th ed. (primary source)</li>\n<li>Eke et al. (2015) — NHANES US prevalence data</li>\n<li>Tonetti et al. (2018) — 2017 World Workshop classification</li>\n<li>Page &amp; Eke (2007) — CDC/AAP case definition</li>\n<li>Kassebaum et al. (2014) — Global burden of periodontitis</li>\n</ul>';

    var d = DATA[c.ch];
    if (c.v !== curV) { html += '<div class="vol-hdr">Volume ' + c.v + '</div>'; curV = c.v; curP = null; }
    if (c.pt !== curP) { html += '<div class="part-hdr">' + c.pt + '</div>'; curP = c.pt; }
    var pip = SG[c.ch] ? '<span class="sg-pip" title="Study guide available"></span>' : '';
    html += '<div class="ch-row' + (selCh === c.ch ? ' sel' : '') + (d.priority ? ' prio' : '') + '" data-ch="' + c.ch + '">'
      + '<span class="ch-num">' + c.ch + '</span>'
      + '<span class="ch-tit">' + c.ti + '</span>'
      + '<span class="ch-au">' + c.au + '</span>'
      + '<span class="ch-right">'
        + pip
        + '<span class="star-row">' + makeStars(d.rating, false) + '</span>'
        + '<button class="flag' + (d.priority ? ' on' : '') + '" data-flag="' + c.ch + '">&#9873;</button>'
        + '<span class="dot ' + d.status + '" data-dot="' + c.ch + '"></span>'
      + '</span>'
    + '</div>';
  });
  list.innerHTML = html;

  // row click — open detail
  list.querySelectorAll('.ch-row').forEach(function(row) {
    row.addEventListener('click', function(e) {
      var t = e.target;
      // ignore clicks on interactive children
      if (t.dataset.flag || t.dataset.dot || t.dataset.sv || t.classList.contains('flag') || t.classList.contains('dot') || t.classList.contains('star-r')) return;
      var ch = parseInt(row.dataset.ch);
      selCh = (selCh === ch) ? null : ch;
      renderList();
      renderDetail();
    });
  });

  list.querySelectorAll('[data-dot]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var ch = parseInt(el.dataset.dot);
      var cycle = { 'not-started': 'in-progress', 'in-progress': 'completed', 'completed': 'not-started' };
      DATA[ch].status = cycle[DATA[ch].status];
      saveData(); renderStats(); renderList();
      if (selCh === ch) renderDetail();
    });
  });

  list.querySelectorAll('[data-flag]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var ch = parseInt(el.dataset.flag);
      DATA[ch].priority = !DATA[ch].priority;
      saveData(); renderStats(); renderList();
      if (selCh === ch) renderDetail();
    });
  });

  list.querySelectorAll('.star-r').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var ch = parseInt(el.closest('.ch-row').dataset.ch);
      var val = parseInt(el.dataset.sv);
      DATA[ch].rating = (DATA[ch].rating === val) ? 0 : val;
      saveData(); renderList();
      if (selCh === ch) renderDetail();
    });
  });
}

// ── detail panel ───────────────────────────────────────────────────────────
function renderDetail() {
  var panel = document.getElementById('detpanel');
  if (!selCh) { panel.innerHTML = ''; return; }

  var c = null;
  for (var i = 0; i < CHS.length; i++) { if (CHS[i].ch === selCh) { c = CHS[i]; break; } }
  if (!c) { panel.innerHTML = ''; return; }

  var d = DATA[selCh];
  var sg = SG[selCh] || null;

  // wrapper
  var wrap = document.createElement('div');
  wrap.className = 'dp-wrap';

  // heading
  var h3 = document.createElement('h3');
  h3.textContent = 'Ch. ' + c.ch + ' — ' + c.ti;
  wrap.appendChild(h3);

  var sub = document.createElement('div');
  sub.className = 'dp-sub';
  sub.textContent = c.pt + ' · ' + c.au;
  wrap.appendChild(sub);

  // tab bar
  var bar = document.createElement('div');
  bar.className = 'tab-bar';
  var tabs = [{ id: 'prog', label: 'Progress' }];
  if (sg) {
    tabs.push({ id: 'sg', label: 'Study guide' });
    tabs.push({ id: 'quiz', label: 'INBDE quiz (' + sg.quiz.length + ')' });
  }
  tabs.forEach(function(t, idx) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' on' : '');
    btn.dataset.tab = t.id;
    btn.textContent = t.label;
    bar.appendChild(btn);
  });
  wrap.appendChild(bar);

  // PANE: Progress
  var paneP = document.createElement('div');
  paneP.className = 'tab-pane on';
  paneP.id = 'pane-prog';

  // status
  var selEl = document.createElement('select');
  selEl.className = 'field-sel';
  selEl.id = 'dp-status';
  ['not-started', 'in-progress', 'completed'].forEach(function(v) {
    var op = document.createElement('option');
    op.value = v;
    op.textContent = v === 'not-started' ? 'Not started' : v === 'in-progress' ? 'In progress' : 'Completed';
    if (d.status === v) op.selected = true;
    selEl.appendChild(op);
  });
  var lbSt = document.createElement('label'); lbSt.className = 'field-label'; lbSt.textContent = 'Status';
  paneP.appendChild(lbSt); paneP.appendChild(selEl);

  // rating
  var lbRt = document.createElement('label'); lbRt.className = 'field-label'; lbRt.textContent = 'Rating';
  paneP.appendChild(lbRt);
  var starWrap = document.createElement('div'); starWrap.className = 'star-big'; starWrap.id = 'dp-stars';
  starWrap.innerHTML = makeStars(d.rating, true);
  paneP.appendChild(starWrap);

  // priority
  var prioBtn = document.createElement('button');
  prioBtn.className = 'prio-tog' + (d.priority ? ' on' : '');
  prioBtn.id = 'dp-prio';
  prioBtn.innerHTML = '<span class="pf">&#9873;</span><span class="pt">' + (d.priority ? 'Flagged as priority' : 'Mark as priority') + '</span>';
  paneP.appendChild(prioBtn);

  // notes
  var lbNt = document.createElement('label'); lbNt.className = 'field-label'; lbNt.textContent = 'Personal notes';
  paneP.appendChild(lbNt);
  var ta = document.createElement('textarea');
  ta.id = 'dp-notes'; ta.className = 'dnotes';  // keep class for reference
  // override inline so it definitely shows
  ta.setAttribute('style', 'display:block;width:100%;font-size:13px;padding:10px 12px;border-radius:8px;border:.5px solid rgba(0,0,0,.18);background:#f0efeb;color:#1a1a18;resize:vertical;min-height:100px;font-family:inherit;line-height:1.6;margin-bottom:16px;');
  ta.placeholder = 'Key concepts, exam notes, clinical pearls...';
  ta.value = d.notes || '';
  paneP.appendChild(ta);

  // file
  var lbFl = document.createElement('label'); lbFl.className = 'field-label'; lbFl.textContent = 'Lecture file';
  paneP.appendChild(lbFl);
  var filesDiv = document.createElement('div'); filesDiv.id = 'dp-files';
  if (d.pptFiles && d.pptFiles.length) {
    d.pptFiles.forEach(function(f, i) {
      var chip = document.createElement('span'); chip.className = 'file-chip';
      chip.innerHTML = f.name + ' <span class="rm-chip" data-rm="' + i + '">&times;</span>';
      filesDiv.appendChild(chip);
    });
  } else {
    filesDiv.innerHTML = '<span style="font-size:12px;color:#8a8a86;">No file attached yet.</span>';
  }
  paneP.appendChild(filesDiv);

  var finpLabel = document.createElement('label'); finpLabel.className = 'file-zone'; finpLabel.setAttribute('for', 'dp-finp');
  finpLabel.innerHTML = '<i class="ti ti-upload"></i> Click to attach a .pptx or .pdf file';
  var finp = document.createElement('input'); finp.type = 'file'; finp.id = 'dp-finp'; finp.className = 'file-inp'; finp.accept = '.pptx,.ppt,.pdf';
  paneP.appendChild(finpLabel); paneP.appendChild(finp);

  // save
  var saveRow = document.createElement('div'); saveRow.style.cssText = 'display:flex;align-items:center;margin-top:16px;';
  var saveBtn = document.createElement('button'); saveBtn.className = 'save-btn'; saveBtn.id = 'dp-save'; saveBtn.textContent = 'Save notes';
  var saveOk = document.createElement('span'); saveOk.className = 'save-ok'; saveOk.id = 'dp-ok'; saveOk.textContent = 'Saved ✓';
  saveRow.appendChild(saveBtn); saveRow.appendChild(saveOk);
  paneP.appendChild(saveRow);
  wrap.appendChild(paneP);

  // PANE: Study guide
  if (sg) {
    var paneSg = document.createElement('div');
    paneSg.className = 'tab-pane'; paneSg.id = 'pane-sg';
    var sgBody = document.createElement('div'); sgBody.className = 'sg-body';
    sgBody.innerHTML = sg.html;
    paneSg.appendChild(sgBody);
    wrap.appendChild(paneSg);

    // PANE: Quiz
    var paneQz = document.createElement('div');
    paneQz.className = 'tab-pane'; paneQz.id = 'pane-quiz';
    wrap.appendChild(paneQz);
  }

  panel.innerHTML = '';
  panel.appendChild(wrap);

  // ── tab switching ──
  wrap.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      wrap.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('on'); });
      wrap.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('on'); });
      btn.classList.add('on');
      var pane = document.getElementById('pane-' + btn.dataset.tab);
      if (pane) pane.classList.add('on');
      if (btn.dataset.tab === 'quiz') renderQuiz();
    });
  });

  // ── progress events ──
  document.getElementById('dp-status').addEventListener('change', function() {
    DATA[selCh].status = this.value; saveData(); renderStats(); renderList();
  });

  prioBtn.addEventListener('click', function() {
    DATA[selCh].priority = !DATA[selCh].priority; saveData(); renderStats(); renderList();
    prioBtn.classList.toggle('on', DATA[selCh].priority);
    prioBtn.querySelector('.pt').textContent = DATA[selCh].priority ? 'Flagged as priority' : 'Mark as priority';
  });

  starWrap.querySelectorAll('.star-b').forEach(function(s) {
    s.addEventListener('click', function() {
      var val = parseInt(s.dataset.sv);
      DATA[selCh].rating = (DATA[selCh].rating === val) ? 0 : val;
      saveData(); renderList();
      starWrap.innerHTML = makeStars(DATA[selCh].rating, true);
      starWrap.querySelectorAll('.star-b').forEach(function(s2) {
        s2.addEventListener('click', arguments.callee);
      });
    });
  });

  document.getElementById('dp-save').addEventListener('click', function() {
    DATA[selCh].notes = document.getElementById('dp-notes').value;
    saveData();
    var ok = document.getElementById('dp-ok');
    ok.classList.add('show');
    setTimeout(function() { ok.classList.remove('show'); }, 1800);
  });

  finp.addEventListener('change', function(e) {
    var f = e.target.files[0]; if (!f) return;
    DATA[selCh].pptFiles.push({ name: f.name, size: f.size, addedAt: new Date().toISOString() });
    saveData(); renderStats(); renderList(); renderDetail();
  });

  filesDiv.querySelectorAll('.rm-chip').forEach(function(btn) {
    btn.addEventListener('click', function() {
      DATA[selCh].pptFiles.splice(parseInt(btn.dataset.rm), 1);
      saveData(); renderStats(); renderList(); renderDetail();
    });
  });
}

// ── quiz ───────────────────────────────────────────────────────────────────
function renderQuiz() {
  var sg = SG[selCh]; if (!sg) return;
  if (!quizAns[selCh]) quizAns[selCh] = {};
  var ans = quizAns[selCh];
  var pane = document.getElementById('pane-quiz'); if (!pane) return;

  var answered = Object.keys(ans).length;
  var correct = 0;
  Object.keys(ans).forEach(function(k) { if (ans[k].correct) correct++; });

  var html = '';
  if (answered > 0) {
    html += '<div class="quiz-score">Score: ' + correct + ' / ' + answered + ' &nbsp;&middot;&nbsp; ' + Math.round(correct / answered * 100) + '% correct</div>';
  }
  html += '<button class="reset-btn" id="rq">Reset quiz</button><div class="q-wrap">';

  sg.quiz.forEach(function(q, i) {
    var a = ans[i];
    html += '<div class="q-card"><div class="q-num">Question ' + (i + 1) + ' of ' + sg.quiz.length + '</div>';
    html += '<div class="q-txt">' + q.q + '</div><div class="q-opts">';
    q.opts.forEach(function(opt, j) {
      var cls = 'q-opt';
      if (a) {
        if (j === q.ans) cls += ' correct';
        else if (j === a.chosen) cls += ' wrong';
      }
      html += '<button class="' + cls + '"' + (a ? ' disabled' : '') + ' data-qi="' + i + '" data-oi="' + j + '">' + String.fromCharCode(65 + j) + '. ' + opt + '</button>';
    });
    html += '</div>';
    if (a) html += '<div class="q-expl"><strong style="color:#2d7a3a">Explanation:</strong> ' + q.expl + '</div>';
    html += '</div>';
  });
  html += '</div>';
  pane.innerHTML = html;

  pane.querySelectorAll('.q-opt:not([disabled])').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var qi = parseInt(btn.dataset.qi), oi = parseInt(btn.dataset.oi);
      ans[qi] = { chosen: oi, correct: oi === sg.quiz[qi].ans };
      renderQuiz();
    });
  });

  var rq = document.getElementById('rq');
  if (rq) rq.addEventListener('click', function() { quizAns[selCh] = {}; renderQuiz(); });
}

// ── auth ───────────────────────────────────────────────────────────────────
function tryUnlock() {
  if (document.getElementById('pw-inp').value === PW) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('la', '1');
  } else {
    document.getElementById('pw-err').textContent = 'Incorrect password.';
    document.getElementById('pw-inp').value = '';
  }
}
document.getElementById('pw-btn').addEventListener('click', tryUnlock);
document.getElementById('pw-inp').addEventListener('keydown', function(e) { if (e.key === 'Enter') tryUnlock(); });
document.getElementById('lock-btn').addEventListener('click', function() {
  sessionStorage.removeItem('la');
  document.getElementById('app').style.display = 'none';
  document.getElementById('lock').style.display = 'flex';
  document.getElementById('pw-inp').value = '';
  document.getElementById('pw-err').textContent = '';
});
if (sessionStorage.getItem('la') === '1') {
  document.getElementById('lock').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ── filters / search ───────────────────────────────────────────────────────
document.querySelectorAll('.fbtn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.fbtn').forEach(function(b) { b.classList.remove('on'); });
    btn.classList.add('on'); activeF = btn.dataset.f; renderList();
  });
});
document.getElementById('srch').addEventListener('input', function() { srchQ = this.value.trim(); renderList(); });

// ── export ─────────────────────────────────────────────────────────────────
document.getElementById('exp-btn').addEventListener('click', function() {
  var rows = [['Ch','Title','Authors','Status','Rating','Priority','Study Guide','Notes']];
  CHS.forEach(function(c) {
    var d = DATA[c.ch];
    rows.push([c.ch, '"'+c.ti+'"', '"'+c.au+'"', d.status, d.rating||0, d.priority?'Yes':'No', SG[c.ch]?'Yes':'No', '"'+(d.notes||'').replace(/"/g,'""')+'"']);
  });
  var csv = rows.map(function(r){return r.join(',');}).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'lindhe_progress.csv'; a.click();
});

// ── init ───────────────────────────────────────────────────────────────────
loadData();
renderStats();
renderList();
</script>
